<main class="page-main">
  <section class="page-hero compact">
    <p class="kicker">Account</p>
    <h1 id="profileTitle">Profile</h1>
    <p id="profileMeta">Loading...</p>
  </section>

  <section class="section account-layout single">
    <article class="notice-card account-card">
      <h2>Edit Profile</h2>
      <p>Changing your in-game name or class updates the roster automatically.</p>
      <form id="profileForm" class="sxs-form">
        <label for="ingameName">In-game Name</label>
        <input id="ingameName" name="ingameName" type="text" required />

        <div id="guildProfileFields">
          <label for="classSlug">Class</label>
          <select id="classSlug" name="classSlug" required></select>
        </div>

        <button class="pretty-button" type="submit">Save Profile</button>
        <button class="pretty-button ghost" type="button" id="logoutButton">Sign Out</button>
      </form>
      <div id="profileMessage" class="form-message"></div>
    </article>
  </section>
