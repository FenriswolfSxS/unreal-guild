    <section class="page-hero compact"><p class="kicker">Guild Library</p><h1 id="dynamicGuideTitle">Guide</h1><p id="dynamicGuideDescription">Guild-created strategy and information.</p></section>

  <footer class="site-footer"><img src="assets/unreal-banner.jpg" alt="Unreal banner" /><p>© Unreal Guild • Sword and Staff</p></footer>
  <script>
    (function(){
      const raw=new URLSearchParams(location.search).get('slug')||'';
      const slug=raw.toLowerCase().replace(/[^a-z0-9_-]/g,'').slice(0,70);
      const root=document.querySelector('#dynamicGuideContent');
      root.dataset.inlineGuidePage=slug?'guide-'+slug:'guide-invalid';
      fetch('/api/guides/manage').then(r=>r.json()).then(d=>{
        const g=(d.guides||[]).find(x=>x.slug===slug); if(!g)return;
        document.title=g.title+' | Unreal Guild'; document.querySelector('#dynamicGuideTitle').textContent=g.title;
        document.querySelector('#dynamicGuideDescription').textContent=g.description||'Guild-created strategy and information.';
      }).catch(()=>{});
    })();
  </script>
